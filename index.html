function cpToDisplay(cp){
  if(!cp)return'—';
  if(cp>=100000&&cp%100000===0)return(cp/100000).toLocaleString()+' pp';
  if(cp>=1000&&cp%1000===0)return(cp/1000).toLocaleString()+' pp';
  if(cp>=100&&cp%100===0)return(cp/100).toLocaleString()+' gp';
  if(cp>=50&&cp%50===0)return(cp/50).toLocaleString()+' ep';
  if(cp>=10&&cp%10===0)return(cp/10).toLocaleString()+' sp';
  if(cp>=100){const gp=Math.floor(cp/100);const rem=cp%100;return gp.toLocaleString()+' gp '+(rem>=10&&rem%10===0?rem/10+' sp':rem+' cp');}
  return cp+' cp';
}

const allCats=['All','Ingredients',...Object.keys(data).filter(k=>k!=='Ingredients')];
let activeCategory='All';let currentItem=null;let currentRoll=null;let focusedIndex=-1;let filteredItems=[];

const catGrid=document.getElementById('catGrid');
const searchArea=document.getElementById('searchArea');
const searchInput=document.getElementById('searchInput');
const dropdown=document.getElementById('dropdown');
const resultCard=document.getElementById('resultCard');
const qtyInput=document.getElementById('qtyInput');
const chaMod=document.getElementById('chaMod');
const rollBtn=document.getElementById('rollBtn');
const rollManual=document.getElementById('rollManual');

allCats.forEach(cat=>{
  const btn=document.createElement('button');
  btn.className='cat-btn';
  if(cat==='All')btn.classList.add('active');
  btn.textContent=cat;
  btn.addEventListener('click',()=>selectCat(cat,btn));
  catGrid.appendChild(btn);
});

function getAllItems(){
  const all=[];
  Object.entries(data).forEach(([cat,items])=>items.forEach(i=>all.push({...i,_cat:cat})));
  return all;
}

function selectCat(cat,btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeCategory=cat;
  searchArea.style.display='block';
  searchInput.value='';
  searchInput.placeholder=cat==='All'?'Search the merchant\'s wares...':'Search '+cat.toLowerCase()+'...';
  dropdown.classList.remove('open');
  resultCard.classList.remove('show');
  currentItem=null;currentRoll=null;
  searchInput.focus();showDropdown('');
}

function getItems(){return activeCategory==='All'?getAllItems():data[activeCategory].map(i=>({...i,_cat:activeCategory}));}

function showDropdown(query){
  const items=getItems();
  filteredItems=query?items.filter(i=>i.name.toLowerCase().includes(query.toLowerCase())):items;
  dropdown.innerHTML='';focusedIndex=-1;
  if(!filteredItems.length){dropdown.innerHTML='<div class="no-results">No treasures found matching your search...</div>';}
  else{
    filteredItems.slice(0,100).forEach(item=>{
      const div=document.createElement('div');div.className='drop-item';
      let badge='';
      if(item.rarity){const cls=RARITY_BADGE[item.rarity]||'r-common';badge='<span class="rarity-badge '+cls+'">'+item.rarity+'</span>';}
      const catTag=activeCategory==='All'?'<span class="drop-cat">'+item._cat+'</span>':'';
      div.innerHTML='<span class="drop-name">'+item.name+'</span><span class="drop-meta"><span class="drop-cost">'+item.cost+'</span>'+catTag+badge+'</span>';
      div.addEventListener('mousedown',e=>{e.preventDefault();selectItem(item);});
      dropdown.appendChild(div);
    });
    if(filteredItems.length>100){
      const more=document.createElement('div');more.className='no-results';
      more.textContent='+'+(filteredItems.length-100)+' more — narrow your search';
      dropdown.appendChild(more);
    }
  }
  dropdown.classList.add('open');
}

function selectItem(item){
  currentItem=item;currentRoll=null;
  searchInput.value=item.name;
  dropdown.classList.remove('open');
  qtyInput.value=1;rollManual.value='';
  document.getElementById('repDisplay').style.display='none';
  renderResult(item);
}

function renderResult(item){
  document.getElementById('rName').textContent=item.name;
  document.getElementById('rCat').textContent='\u2767 '+(item._cat||activeCategory)+' \u2767';
  document.getElementById('rCost').textContent=item.cost;
  document.getElementById('rCostNote').textContent=item.note||'';
  const badgeEl=document.getElementById('rBadge');
  if(item.rarity){const cls=RARITY_BADGE[item.rarity]||'r-common';badgeEl.innerHTML='<span class="rarity-badge '+cls+'" style="font-size:10px;padding:4px 12px;">'+item.rarity+'</span>';}
  else badgeEl.innerHTML='';
  const details=document.getElementById('rDetails');
  details.innerHTML='';
  Object.entries(item.details).forEach(([k,v])=>{
    const cell=document.createElement('div');cell.className='detail-cell';
    cell.innerHTML='<div class="detail-label">'+k+'</div><div class="detail-val">'+v+'</div>';
    details.appendChild(cell);
  });
  const craftBox=document.getElementById('craftBox');
  const craftRow=document.getElementById('craftRow');
  if(item.rarity&&CRAFT[item.rarity]){
    const c=CRAFT[item.rarity];
    craftRow.innerHTML='<span class="craft-stat">Time: <span>'+c.days+' days</span></span><span class="craft-stat">Materials: <span>'+c.cost+'</span></span><span class="craft-stat">Requires: <span>Arcana proficiency</span></span>';
    craftBox.style.display='block';
  } else if(item.rarity==='Artifact'){
    craftRow.innerHTML='<span class="craft-stat">Artifacts cannot be crafted — they are ancient and unique.</span>';
    craftBox.style.display='block';
  } else craftBox.style.display='none';
  resultCard.classList.add('show');
  updateTotal();
}

function updateTotal(){
  if(!currentItem)return;
  const qty=Math.max(1,parseInt(qtyInput.value)||1);
  const totalEl=document.getElementById('totalVal');
  const subEl=document.getElementById('totalSub');
  if(currentItem.baseCost===null||currentItem.baseCost===undefined){totalEl.textContent=currentItem.cost;subEl.textContent='';return;}
  if(currentItem.baseCost===0){totalEl.textContent='—';subEl.textContent='';return;}
  let mult=currentRoll!==null?getTier(currentRoll).mult:1.0;
  const final=Math.round(currentItem.baseCost*qty*mult);
  totalEl.textContent=cpToDisplay(final);
  const parts=[];
  if(qty>1)parts.push(qty+'× base');
  if(mult!==1.0)parts.push((mult>1?'+':'')+Math.round((mult-1)*100)+'% reputation');
  subEl.textContent=parts.join(' · ');
}

function applyRoll(raw){
  const mod=parseInt(chaMod.value)||0;
  const eff=Math.max(1,Math.min(20,raw+mod));
  currentRoll=eff;
  const t=getTier(eff);
  const repEl=document.getElementById('repDisplay');
  repEl.style.display='flex';repEl.style.background=t.bg;repEl.style.borderColor='rgba(201,168,76,0.2)';
  const nameEl=document.getElementById('repName');nameEl.textContent=t.name;nameEl.style.color=t.nameColor;
  const descEl=document.getElementById('repDesc');
  descEl.textContent='Roll: '+raw+(mod!==0?' ('+raw+(mod>=0?'+':'')+mod+' = '+eff+')':'')+' — '+t.desc;
  descEl.style.color=t.descColor;
  const modEl=document.getElementById('repMod');modEl.textContent=t.modLabel;modEl.style.color=t.nameColor;
  updateTotal();
}

rollBtn.addEventListener('click',()=>{
  const raw=Math.ceil(Math.random()*20);
  const icon=document.getElementById('diceIcon');
  icon.classList.remove('spinning');void icon.offsetWidth;icon.classList.add('spinning');
  setTimeout(()=>icon.classList.remove('spinning'),400);
  rollManual.value=raw;applyRoll(raw);
});
rollManual.addEventListener('input',()=>{const v=parseInt(rollManual.value);if(v>=1&&v<=20)applyRoll(v);});
chaMod.addEventListener('input',()=>{if(rollManual.value){applyRoll(parseInt(rollManual.value)||1);}});
qtyInput.addEventListener('input',updateTotal);
searchInput.addEventListener('input',e=>showDropdown(e.target.value));
searchInput.addEventListener('focus',()=>showDropdown(searchInput.value));
searchInput.addEventListener('keydown',e=>{
  const items=dropdown.querySelectorAll('.drop-item');
  if(e.key==='ArrowDown'){focusedIndex=Math.min(focusedIndex+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('focused',i===focusedIndex));e.preventDefault();}
  else if(e.key==='ArrowUp'){focusedIndex=Math.max(focusedIndex-1,0);items.forEach((el,i)=>el.classList.toggle('focused',i===focusedIndex));e.preventDefault();}
  else if(e.key==='Enter'&&focusedIndex>=0&&filteredItems[focusedIndex])selectItem(filteredItems[focusedIndex]);
  else if(e.key==='Escape')dropdown.classList.remove('open');
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))dropdown.classList.remove('open');});
</script>

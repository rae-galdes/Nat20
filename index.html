
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --p:#1a1410;--pm:#221c15;--pc:#2a221a;--ph:#332a20;
  --gold:#c9a84c;--gl:#e2c87a;--gd:#7a6330;--gg:rgba(201,168,76,0.15);
  --cr:#8b1a1a;--crl:#b52828;--ink:#f0e8d8;--im:#a89878;--if:#6b5c45;
  --bg:rgba(201,168,76,0.3);--bgb:rgba(201,168,76,0.6);
}
body{background:var(--p);font-family:'EB Garamond',Georgia,serif;color:var(--ink);margin:0;padding:0;}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--p);}

.header{text-align:center;padding:20px 16px 14px;border-bottom:1px solid var(--bg);position:relative;}
.header::after{content:'';position:absolute;bottom:-2px;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(to right,transparent,var(--gd),transparent);}
.h-title{font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;color:var(--gl);letter-spacing:0.06em;margin-bottom:2px;}
.h-sub{font-family:'EB Garamond',serif;font-size:12px;color:var(--im);font-style:italic;}

.currency-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;padding:10px 14px;border-bottom:1px solid var(--bg);}
.cur-chip{background:var(--pm);border:1px solid var(--bg);border-radius:6px;padding:5px 8px;font-family:'Cinzel',serif;font-size:10px;color:var(--im);letter-spacing:0.03em;display:flex;align-items:center;gap:5px;}
.cur-chip:last-child{grid-column:1/-1;}
.cur-label{color:var(--gl);font-weight:600;}

.body{padding:14px;}

.sec-label{font-family:'Cinzel',serif;font-size:9px;font-weight:600;color:var(--gd);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:8px;}

.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:16px;}
.cat-btn{background:var(--pm);border:1px solid var(--bg);border-radius:6px;padding:8px 6px;font-family:'Cinzel',serif;font-size:9px;font-weight:600;color:var(--im);cursor:pointer;letter-spacing:0.04em;text-transform:uppercase;transition:all 0.2s;-webkit-tap-highlight-color:transparent;text-align:center;line-height:1.3;}
.cat-btn.active{background:var(--gg);border-color:var(--gold);color:var(--gl);}
.cat-btn:active{transform:scale(0.96);}

.search-wrap{position:relative;margin-bottom:16px;}
.search-input{width:100%;padding:12px 16px;font-family:'EB Garamond',serif;font-size:16px;border:1px solid var(--bg);border-radius:8px;background:var(--pm);color:var(--ink);outline:none;-webkit-appearance:none;}
.search-input::placeholder{color:var(--if);font-style:italic;}
.search-input:focus{border-color:var(--gold);}

.dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--pc);border:1px solid var(--bg);border-radius:8px;max-height:280px;overflow-y:auto;z-index:20;display:none;scrollbar-width:thin;scrollbar-color:var(--gd) var(--pm);}
.dropdown.open{display:block;}
.drop-item{padding:11px 16px;font-family:'EB Garamond',serif;font-size:15px;cursor:pointer;color:var(--im);border-bottom:1px solid rgba(201,168,76,0.08);display:flex;justify-content:space-between;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent;}
.drop-item:last-child{border-bottom:none;}
.drop-item:active{background:var(--ph);}
.drop-name{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.no-results{padding:14px 16px;font-size:14px;color:var(--if);font-style:italic;text-align:center;}

.rbadge{font-family:'Cinzel',serif;font-size:9px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;letter-spacing:0.05em;text-transform:uppercase;}
.r-common{background:#2a2a25;color:#aaa89a;border:1px solid #4a4a40;}
.r-uncommon{background:#1a2a1a;color:#7ab87a;border:1px solid #3a6a3a;}
.r-rare{background:#1a1f2e;color:#7a9ad4;border:1px solid #3a4a7a;}
.r-very-rare{background:#251a35;color:#b07adc;border:1px solid #5a3a7a;}
.r-legendary{background:#2e2010;color:#d4a050;border:1px solid #7a5020;}
.r-artifact{background:#2e1010;color:#dc7a7a;border:1px solid #7a3030;}

.card{background:var(--pc);border:1px solid var(--bg);border-radius:8px;padding:16px;margin-bottom:16px;display:none;position:relative;}
.card::before,.card::after{content:'';position:absolute;width:10px;height:10px;border-color:var(--gd);border-style:solid;}
.card::before{top:5px;left:5px;border-width:1px 0 0 1px;}
.card::after{bottom:5px;right:5px;border-width:0 1px 1px 0;}
.card.show{display:block;}

.item-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:2px;}
.item-name{font-family:'Cinzel',serif;font-size:17px;font-weight:600;color:var(--gl);letter-spacing:0.03em;line-height:1.3;}
.item-cat{font-family:'Cinzel',serif;font-size:9px;color:var(--if);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;}
.cost-row{display:flex;align-items:baseline;gap:8px;margin-bottom:12px;}
.cost-big{font-family:'Cinzel',serif;font-size:26px;font-weight:700;color:var(--gl);}
.cost-note{font-size:12px;color:var(--im);font-style:italic;}

.details-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;margin-bottom:12px;}
.detail-cell{background:var(--pm);border:1px solid rgba(201,168,76,0.12);border-radius:6px;padding:8px 10px;}
.detail-label{font-family:'Cinzel',serif;font-size:9px;color:var(--if);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:3px;}
.detail-val{font-family:'EB Garamond',serif;font-size:13px;color:var(--ink);}

.craft-box{background:var(--pm);border:1px solid rgba(139,26,26,0.35);border-radius:6px;padding:10px 12px;margin-bottom:12px;}
.craft-title{font-family:'Cinzel',serif;font-size:9px;color:var(--crl);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;}
.craft-row{display:flex;flex-wrap:wrap;gap:10px;}
.craft-stat{font-size:13px;color:var(--im);font-style:italic;}
.craft-stat span{font-style:normal;color:var(--ink);}

.divider{border:none;border-top:1px solid var(--bg);margin:14px 0;position:relative;}
.divider::after{content:'✦';position:absolute;top:-9px;left:50%;transform:translateX(-50%);background:var(--pc);padding:0 8px;color:var(--gd);font-size:11px;}

.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.field-group{display:flex;flex-direction:column;gap:5px;}
.field-label{font-family:'Cinzel',serif;font-size:9px;font-weight:600;color:var(--im);text-transform:uppercase;letter-spacing:0.08em;}
.field-input{padding:10px 12px;font-family:'EB Garamond',serif;font-size:16px;border:1px solid var(--bg);border-radius:6px;background:var(--pm);color:var(--ink);outline:none;width:100%;-webkit-appearance:none;}
.field-input:focus{border-color:var(--gold);}

.roll-section{margin-bottom:14px;}
.roll-btns{display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:8px;align-items:center;}
.roll-btn{padding:13px 16px;font-family:'Cinzel',serif;font-size:12px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;background:var(--pm);border:1px solid var(--gd);border-radius:8px;cursor:pointer;color:var(--gl);transition:all 0.15s;-webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;gap:8px;}
.roll-btn:active{background:var(--gg);transform:scale(0.97);}
.roll-manual{width:64px;padding:13px 10px;font-family:'Cinzel',serif;font-size:18px;font-weight:600;text-align:center;border:1px solid var(--bg);border-radius:8px;background:var(--pm);color:var(--gl);outline:none;-webkit-appearance:none;}
.roll-manual:focus{border-color:var(--gold);}

.rep-display{border-radius:8px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;border:1px solid rgba(201,168,76,0.18);display:none;}
.rep-name{font-family:'Cinzel',serif;font-size:14px;font-weight:600;letter-spacing:0.03em;}
.rep-desc{font-size:12px;margin-top:2px;font-style:italic;}
.rep-mod{font-family:'Cinzel',serif;font-size:18px;font-weight:700;flex-shrink:0;margin-left:12px;}

.total-row{background:var(--pm);border:1px solid var(--bgb);border-radius:8px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:relative;}
.total-row::before,.total-row::after{content:'';position:absolute;width:7px;height:7px;border-color:var(--gold);border-style:solid;}
.total-row::before{top:4px;left:4px;border-width:1px 0 0 1px;}
.total-row::after{bottom:4px;right:4px;border-width:0 1px 1px 0;}
.total-label{font-family:'Cinzel',serif;font-size:10px;font-weight:600;color:var(--im);text-transform:uppercase;letter-spacing:0.1em;}
.total-sub{font-size:11px;color:var(--if);font-style:italic;margin-top:3px;}
.total-val{font-family:'Cinzel',serif;font-size:22px;font-weight:700;color:var(--gl);text-align:right;}

.dice{display:inline-block;font-size:18px;}
@keyframes dr{0%{transform:rotate(0) scale(1.3);}50%{transform:rotate(180deg) scale(0.8);}100%{transform:rotate(360deg) scale(1);}}
.spin{animation:dr 0.4s ease-out;}
</style>

<div class="app">
  <div class="header">
    <div class="h-title">Merchant's Ledger</div>
    <div class="h-sub">D&D 5e · Item Pricing & Bartering</div>
  </div>

  <div class="currency-grid">
    <div class="cur-chip"><span>🟤</span><span><span class="cur-label">Copper (cp)</span> · 100 = 1 gp</span></div>
    <div class="cur-chip"><span>⚪</span><span><span class="cur-label">Silver (sp)</span> · 10 = 1 gp</span></div>
    <div class="cur-chip"><span>🟡</span><span><span class="cur-label">Electrum (ep)</span> · 2 = 1 gp</span></div>
    <div class="cur-chip"><span>🟠</span><span><span class="cur-label">Gold (gp)</span> · base unit</span></div>
    <div class="cur-chip"><span>🔵</span><span><span class="cur-label">Platinum (pp)</span> · 1 pp = 10 gp</span></div>
  </div>

  <div class="body">
    <div class="sec-label">Browse by category</div>
    <div class="cat-grid" id="catGrid"></div>

    <div id="searchArea" style="display:none;">
      <div class="search-wrap">
        <input type="text" class="search-input" id="searchInput" placeholder="Search the merchant's wares..." autocomplete="off" autocorrect="off" autocapitalize="off"/>
        <div class="dropdown" id="dropdown"></div>
      </div>
    </div>

    <div class="card" id="resultCard">
      <div class="item-top">
        <div class="item-name" id="rName"></div>
        <div id="rBadge"></div>
      </div>
      <div class="item-cat" id="rCat"></div>
      <div class="cost-row">
        <span class="cost-big" id="rCost"></span>
        <span class="cost-note" id="rNote"></span>
      </div>
      <div class="details-grid" id="rDetails"></div>
      <div class="craft-box" id="craftBox" style="display:none;">
        <div class="craft-title">⚗ Crafting — DMG rules</div>
        <div class="craft-row" id="craftRow"></div>
      </div>

      <div class="divider"></div>
      <div class="sec-label">Calculate price</div>
      <div class="calc-grid">
        <div class="field-group">
          <span class="field-label">Quantity</span>
          <input type="number" class="field-input" id="qtyInput" value="1" min="1" inputmode="numeric"/>
        </div>
        <div class="field-group">
          <span class="field-label">CHA modifier</span>
          <input type="number" class="field-input" id="chaMod" value="0" min="-5" max="10" inputmode="numeric"/>
        </div>
      </div>

      <div class="roll-section">
        <div class="sec-label">Reputation & bartering</div>
        <div class="roll-btns">
          <button class="roll-btn" id="rollBtn"><span class="dice" id="diceIcon">🎲</span> Roll d20</button>
          <input type="number" class="roll-manual" id="rollManual" min="1" max="20" placeholder="—" inputmode="numeric"/>
        </div>
        <div class="rep-display" id="repDisplay">
          <div>
            <div class="rep-name" id="repName"></div>
            <div class="rep-desc" id="repDesc"></div>
          </div>
          <div class="rep-mod" id="repMod"></div>
        </div>
      </div>

      <div class="total-row">
        <div>
          <div class="total-label">Final price</div>
          <div class="total-sub" id="totalSub"></div>
        </div>
        <div class="total-val" id="totalVal">—</div>
      </div>
    </div>
  </div>
</div>

function cpToDisplay(cp){
  if(!cp)return'—';
  if(cp>=1000000&&cp%1000000===0)return(cp/100000).toLocaleString()+' gp';
  if(cp>=100000&&cp%100000===0)return(cp/100000).toLocaleString()+' pp';
  if(cp>=1000&&cp%1000===0)return(cp/1000).toLocaleString()+' gp';
  if(cp>=100&&cp%100===0)return(cp/100).toLocaleString()+' gp';
  if(cp>=50&&cp%50===0)return(cp/50).toLocaleString()+' ep';
  if(cp>=10&&cp%10===0)return(cp/10).toLocaleString()+' sp';
  if(cp>=100){const gp=Math.floor(cp/100);const rem=cp%100;return gp.toLocaleString()+' gp '+(rem>=10&&rem%10===0?rem/10+' sp':rem+' cp');}
  return cp+' cp';
}

const allCats=['All','Ingredients',...Object.keys(data).filter(k=>k!=='Ingredients')];
let activeCat='All';let curItem=null;let curRoll=null;let filtered=[];let focusIdx=-1;

const catGrid=document.getElementById('catGrid');
const searchArea=document.getElementById('searchArea');
const searchInput=document.getElementById('searchInput');
const dropdown=document.getElementById('dropdown');
const resultCard=document.getElementById('resultCard');
const qtyInput=document.getElementById('qtyInput');
const chaMod=document.getElementById('chaMod');
const rollBtn=document.getElementById('rollBtn');
const rollManual=document.getElementById('rollManual');

allCats.forEach(cat=>{
  const btn=document.createElement('button');
  btn.className='cat-btn'+(cat==='All'?' active':'');
  btn.textContent=cat;
  btn.addEventListener('click',()=>selCat(cat,btn));
  catGrid.appendChild(btn);
});

function getAllItems(){const a=[];Object.entries(data).forEach(([c,items])=>items.forEach(i=>a.push({...i,_cat:c})));return a;}
function getItems(){return activeCat==='All'?getAllItems():data[activeCat].map(i=>({...i,_cat:activeCat}));}

function selCat(cat,btn){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeCat=cat;
  searchArea.style.display='block';
  searchInput.value='';
  searchInput.placeholder=cat==='All'?'Search the merchant\'s wares...':'Search '+cat.toLowerCase()+'...';
  dropdown.classList.remove('open');
  resultCard.classList.remove('show');
  curItem=null;curRoll=null;
  showDropdown('');
}

function showDropdown(q){
  const items=getItems();
  filtered=q?items.filter(i=>i.name.toLowerCase().includes(q.toLowerCase())):items;
  dropdown.innerHTML='';focusIdx=-1;
  if(!filtered.length){dropdown.innerHTML='<div class="no-results">No treasures found…</div>';}
  else{
    filtered.slice(0,80).forEach(item=>{
      const div=document.createElement('div');div.className='drop-item';
      let badge='';
      if(item.rarity){const cls=RARITY_BADGE[item.rarity]||'r-common';badge='<span class="rbadge '+cls+'">'+item.rarity+'</span>';}
      const catTag=activeCat==='All'?'<span style="font-family:Cinzel,serif;font-size:9px;color:var(--if);text-transform:uppercase;letter-spacing:0.06em;">'+item._cat+'</span>':'';
      div.innerHTML='<span class="drop-name">'+item.name+'</span><span style="display:flex;align-items:center;gap:5px;flex-shrink:0;"><span style="font-size:12px;color:var(--gd);font-style:italic;">'+item.cost+'</span>'+catTag+badge+'</span>';
      div.addEventListener('touchstart',e=>{e.preventDefault();selItem(item);},{passive:false});
      div.addEventListener('mousedown',e=>{e.preventDefault();selItem(item);});
      dropdown.appendChild(div);
    });
    if(filtered.length>80){const m=document.createElement('div');m.className='no-results';m.textContent='+'+(filtered.length-80)+' more — narrow your search';dropdown.appendChild(m);}
  }
  dropdown.classList.add('open');
}

function selItem(item){
  curItem=item;curRoll=null;
  searchInput.value=item.name;
  dropdown.classList.remove('open');
  qtyInput.value=1;rollManual.value='';
  document.getElementById('repDisplay').style.display='none';
  renderResult(item);
  resultCard.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderResult(item){
  document.getElementById('rName').textContent=item.name;
  document.getElementById('rCat').textContent='✦ '+(item._cat||activeCat)+' ✦';
  document.getElementById('rCost').textContent=item.cost;
  document.getElementById('rNote').textContent=item.note||'';
  const badgeEl=document.getElementById('rBadge');
  if(item.rarity){const cls=RARITY_BADGE[item.rarity]||'r-common';badgeEl.innerHTML='<span class="rbadge '+cls+'" style="padding:3px 10px;font-size:10px;">'+item.rarity+'</span>';}
  else badgeEl.innerHTML='';
  const det=document.getElementById('rDetails');det.innerHTML='';
  Object.entries(item.details).forEach(([k,v])=>{
    const c=document.createElement('div');c.className='detail-cell';
    c.innerHTML='<div class="detail-label">'+k+'</div><div class="detail-val">'+v+'</div>';
    det.appendChild(c);
  });
  const cb=document.getElementById('craftBox');const cr=document.getElementById('craftRow');
  if(item.rarity&&CRAFT[item.rarity]){
    const c=CRAFT[item.rarity];
    cr.innerHTML='<span class="craft-stat">Time: <span>'+c.days+' days</span></span><span class="craft-stat">Materials: <span>'+c.cost+'</span></span><span class="craft-stat">Needs: <span>Arcana prof.</span></span>';
    cb.style.display='block';
  } else if(item.rarity==='Artifact'){
    cr.innerHTML='<span class="craft-stat">Artifacts cannot be crafted — ancient and unique.</span>';
    cb.style.display='block';
  } else cb.style.display='none';
  resultCard.classList.add('show');
  updateTotal();
}

function updateTotal(){
  if(!curItem)return;
  const qty=Math.max(1,parseInt(qtyInput.value)||1);
  const tv=document.getElementById('totalVal');const ts=document.getElementById('totalSub');
  if(curItem.baseCost===null||curItem.baseCost===undefined){tv.textContent=curItem.cost;ts.textContent='';return;}
  if(curItem.baseCost===0){tv.textContent='—';ts.textContent='';return;}
  const mult=curRoll!==null?getTier(curRoll).mult:1.0;
  const final=Math.round(curItem.baseCost*qty*mult);
  tv.textContent=cpToDisplay(final);
  const p=[];
  if(qty>1)p.push(qty+'× base');
  if(mult!==1.0)p.push((mult>1?'+':'')+Math.round((mult-1)*100)+'% reputation');
  ts.textContent=p.join(' · ');
}

function applyRoll(raw){
  const mod=parseInt(chaMod.value)||0;
  const eff=Math.max(1,Math.min(20,raw+mod));
  curRoll=eff;
  const t=getTier(eff);
  const rd=document.getElementById('repDisplay');
  rd.style.display='flex';rd.style.background=t.bg;rd.style.borderColor='rgba(201,168,76,0.2)';
  const rn=document.getElementById('repName');rn.textContent=t.name;rn.style.color=t.nc;
  const rdesc=document.getElementById('repDesc');
  rdesc.textContent='Roll: '+raw+(mod!==0?' ('+raw+(mod>=0?'+':'')+mod+'='+eff+')':'')+' — '+t.desc;
  rdesc.style.color=t.dc;
  const rm=document.getElementById('repMod');rm.textContent=t.ml;rm.style.color=t.nc;
  updateTotal();
}

rollBtn.addEventListener('click',()=>{
  const raw=Math.ceil(Math.random()*20);
  const ic=document.getElementById('diceIcon');
  ic.classList.remove('spin');void ic.offsetWidth;ic.classList.add('spin');
  setTimeout(()=>ic.classList.remove('spin'),400);
  rollManual.value=raw;applyRoll(raw);
});
rollManual.addEventListener('input',()=>{const v=parseInt(rollManual.value);if(v>=1&&v<=20)applyRoll(v);});
chaMod.addEventListener('input',()=>{if(rollManual.value)applyRoll(parseInt(rollManual.value)||1);});
qtyInput.addEventListener('input',updateTotal);
searchInput.addEventListener('input',e=>showDropdown(e.target.value));
searchInput.addEventListener('focus',()=>showDropdown(searchInput.value));
searchInput.addEventListener('keydown',e=>{
  const items=dropdown.querySelectorAll('.drop-item');
  if(e.key==='ArrowDown'){focusIdx=Math.min(focusIdx+1,items.length-1);items.forEach((el,i)=>el.classList.toggle('focused',i===focusIdx));e.preventDefault();}
  else if(e.key==='ArrowUp'){focusIdx=Math.max(focusIdx-1,0);items.forEach((el,i)=>el.classList.toggle('focused',i===focusIdx));e.preventDefault();}
  else if(e.key==='Enter'&&focusIdx>=0&&filtered[focusIdx])selItem(filtered[focusIdx]);
  else if(e.key==='Escape')dropdown.classList.remove('open');
});
document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))dropdown.classList.remove('open');});
</script>
